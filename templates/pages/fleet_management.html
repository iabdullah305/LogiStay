{% extends "templates/web.html" %}

{% block title %}Fleet Management Dashboard - LogiStay{% endblock %}

{% block head_include %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fleet Management Dashboard for LogiStay">
{% endblock %}

{% block content %}
    <div id="fleet-app">
        <!-- Vue app will mount here -->
        <div class="loading-container text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="sr-only">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading Fleet Management Dashboard...</p>
        </div>
    </div>
{% endblock %}

{% block script %}
    <script type="module" src="/assets/logistay/dist/fleet.js"></script>
{% endblock %}
