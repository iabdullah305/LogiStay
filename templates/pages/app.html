{% extends "templates/web.html" %}

{% block title %}{{ title or "LogiStay Fleet Management" }}{% endblock %}

{% block head_include %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LogiStay Fleet and Accommodation Management System">
    <link rel="stylesheet" href="/assets/frappe/dist/css/website.bundle.css">
{% endblock %}

{% block content %}
    <div id="app">
        <!-- Vue app will mount here -->
        <div class="loading-container" style="display: flex; justify-content: center; align-items: center; height: 50vh;">
            <div class="loading-spinner">
                <i class="fa fa-spinner fa-spin fa-2x text-gray-400"></i>
                <p class="mt-4 text-gray-600">Loading application...</p>
            </div>
        </div>
    </div>
{% endblock %}

{% block script %}
    <script type="module" src="/assets/logistay/dist/app.js"></script>
{% endblock %}
