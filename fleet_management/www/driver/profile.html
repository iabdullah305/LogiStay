<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Driver Dashboard</title>
    <link rel="stylesheet" href="/assets/frappe/css/frappe-web.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --uber-black: #000000;
            --uber-dark-gray: #1a1a1a;
            --uber-gray: #2d2d2d;
            --uber-light-gray: #4a4a4a;
            --uber-white: #ffffff;
            --uber-green: #00d4aa;
            --uber-blue: #276ef1;
            --uber-red: #e74c3c;
            --uber-yellow: #f1c40f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--uber-black) 0%, var(--uber-dark-gray) 100%);
            color: var(--uber-white);
            min-height: 100vh;
            direction: rtl;
        }

        .profile-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            text-decoration: none;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--uber-green), var(--uber-blue));
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--uber-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .profile-info {
            display: grid;
            gap: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 0.9rem;
            color: var(--uber-green);
            font-weight: 500;
        }

        .info-value {
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--uber-green);
        }

        .form-group input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--uber-green);
            box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.2);
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            color: var(--uber-white);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--uber-white);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-active {
            background: var(--uber-green);
            color: var(--uber-black);
        }

        .status-inactive {
            background: var(--uber-red);
            color: var(--uber-white);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: rgba(0, 212, 170, 0.2);
            border: 1px solid var(--uber-green);
            color: var(--uber-green);
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--uber-red);
            color: var(--uber-red);
        }

        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--uber-dark-gray);
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--uber-green);
        }

        .close {
            color: var(--uber-white);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: var(--uber-red);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        @media (max-width: 768px) {
            .profile-container {
                padding: 15px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .profile-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                margin: 5% auto;
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-user-circle"></i> الملف الشخصي</h1>
            <a href="/driver" class="back-btn">
                <i class="fas fa-arrow-right"></i> العودة للوحة التحكم
            </a>
        </div>

        <!-- Alert Messages -->
        <div id="alert-success" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span id="success-message"></span>
        </div>
        
        <div id="alert-error" class="alert alert-error">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="error-message"></span>
        </div>

        <!-- Profile Grid -->
        <div class="profile-grid">
            <!-- Personal Information -->
            <div class="profile-card">
                <h2 class="card-title">
                    <i class="fas fa-user"></i> المعلومات الشخصية
                </h2>
                
                <div id="profile-info" class="profile-info">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p>جاري تحميل البيانات...</p>
                    </div>
                </div>
            </div>

            <!-- Account Settings -->
            <div class="profile-card">
                <h2 class="card-title">
                    <i class="fas fa-cog"></i> إعدادات الحساب
                </h2>
                
                <div class="profile-info">
                    <button class="btn btn-primary" onclick="openPasswordModal()">
                        <i class="fas fa-key"></i> تغيير كلمة المرور
                    </button>
                    
                    <div class="info-item">
                        <span class="info-label">آخر تسجيل دخول</span>
                        <span class="info-value" id="last-login">--</span>
                    </div>
                    
                    <div class="info-item">
                        <span class="info-label">حالة الحساب</span>
                        <span class="info-value">
                            <span class="status-badge status-active">
                                <i class="fas fa-check-circle"></i> نشط
                            </span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="password-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">تغيير كلمة المرور</h3>
                <span class="close" onclick="closePasswordModal()">&times;</span>
            </div>
            
            <form id="password-form">
                <div class="form-group">
                    <label for="current-password">كلمة المرور الحالية *</label>
                    <input type="password" id="current-password" required>
                </div>
                
                <div class="form-group">
                    <label for="new-password">كلمة المرور الجديدة *</label>
                    <input type="password" id="new-password" required minlength="8">
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">تأكيد كلمة المرور الجديدة *</label>
                    <input type="password" id="confirm-password" required>
                </div>
            </form>
            
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closePasswordModal()">
                    إلغاء
                </button>
                <button type="submit" form="password-form" class="btn btn-primary" id="change-password-btn">
                    <i class="fas fa-save"></i> تغيير كلمة المرور
                </button>
            </div>
        </div>
    </div>

    <script src="/assets/frappe/js/frappe-web.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadProfile();
            
            // Password form submission
            document.getElementById('password-form').addEventListener('submit', handlePasswordChange);
        });

        async function loadProfile() {
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.get_profile');
                const data = await response.json();
                
                if (data.message && data.message.profile) {
                    displayProfile(data.message.profile);
                } else {
                    showError('حدث خطأ في تحميل البيانات الشخصية');
                }
            } catch (error) {
                console.error('Error loading profile:', error);
                showError('حدث خطأ في تحميل البيانات الشخصية');
            }
        }

        function displayProfile(profile) {
            const container = document.getElementById('profile-info');
            
            container.innerHTML = `
                <div class="info-item">
                    <span class="info-label">الاسم الكامل</span>
                    <span class="info-value">${profile.full_name || '--'}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">رقم الموظف</span>
                    <span class="info-value">${profile.employee_id || '--'}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">رقم الرخصة</span>
                    <span class="info-value">${profile.license_number || '--'}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">تاريخ انتهاء الرخصة</span>
                    <span class="info-value">${formatDate(profile.license_expiry) || '--'}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">رقم الهاتف</span>
                    <span class="info-value">${profile.phone || '--'}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">البريد الإلكتروني</span>
                    <span class="info-value">${profile.email || '--'}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">العنوان</span>
                    <span class="info-value">${profile.address || '--'}</span>
                </div>
                
                <div class="info-item">
                    <span class="info-label">الحالة</span>
                    <span class="info-value">
                        <span class="status-badge ${profile.status === 'Active' ? 'status-active' : 'status-inactive'}">
                            <i class="fas ${profile.status === 'Active' ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                            ${profile.status === 'Active' ? 'نشط' : 'غير نشط'}
                        </span>
                    </span>
                </div>
            `;
        }

        function openPasswordModal() {
            document.getElementById('password-modal').style.display = 'block';
        }

        function closePasswordModal() {
            document.getElementById('password-modal').style.display = 'none';
            document.getElementById('password-form').reset();
        }

        async function handlePasswordChange(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showError('كلمة المرور الجديدة وتأكيدها غير متطابقتين');
                return;
            }
            
            const changeBtn = document.getElementById('change-password-btn');
            const originalText = changeBtn.innerHTML;
            
            // Disable button and show loading
            changeBtn.disabled = true;
            changeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التغيير...';
            
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.change_password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    showSuccess('تم تغيير كلمة المرور بنجاح');
                    closePasswordModal();
                } else {
                    showError(data.message?.error || 'حدث خطأ في تغيير كلمة المرور');
                }
            } catch (error) {
                console.error('Error changing password:', error);
                showError('حدث خطأ في تغيير كلمة المرور');
            } finally {
                // Re-enable button
                changeBtn.disabled = false;
                changeBtn.innerHTML = originalText;
            }
        }

        function formatDate(dateString) {
            if (!dateString) return null;
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA');
        }

        function showSuccess(message) {
            const alert = document.getElementById('alert-success');
            const messageSpan = document.getElementById('success-message');
            messageSpan.textContent = message;
            alert.style.display = 'block';
            
            // Hide error alert
            document.getElementById('alert-error').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function showError(message) {
            const alert = document.getElementById('alert-error');
            const messageSpan = document.getElementById('error-message');
            messageSpan.textContent = message;
            alert.style.display = 'block';
            
            // Hide success alert
            document.getElementById('alert-success').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('password-modal');
            if (event.target === modal) {
                closePasswordModal();
            }
        }
    </script>
</body>
</html>
