<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Driver Dashboard</title>
    <link rel="stylesheet" href="/assets/frappe/css/frappe-web.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --uber-black: #000000;
            --uber-dark-gray: #1a1a1a;
            --uber-gray: #2d2d2d;
            --uber-light-gray: #4a4a4a;
            --uber-white: #ffffff;
            --uber-green: #00d4aa;
            --uber-blue: #276ef1;
            --uber-red: #e74c3c;
            --uber-yellow: #f1c40f;
            --uber-orange: #ff6b35;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--uber-black) 0%, var(--uber-dark-gray) 100%);
            color: var(--uber-white);
            min-height: 100vh;
            direction: rtl;
        }

        .support-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            text-decoration: none;
        }

        .support-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .support-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .support-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--uber-green), var(--uber-blue));
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--uber-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            color: var(--uber-white);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--uber-white);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .quick-actions {
            display: grid;
            gap: 15px;
        }

        .action-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .action-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .action-item h3 {
            color: var(--uber-green);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-item p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .tickets-list {
            display: grid;
            gap: 20px;
        }

        .ticket-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .ticket-item:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .ticket-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .ticket-id {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .ticket-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-open {
            background: var(--uber-blue);
            color: var(--uber-white);
        }

        .status-in-progress {
            background: var(--uber-orange);
            color: var(--uber-white);
        }

        .status-resolved {
            background: var(--uber-green);
            color: var(--uber-black);
        }

        .status-closed {
            background: var(--uber-light-gray);
            color: var(--uber-white);
        }

        .ticket-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
        }

        .ticket-description {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--uber-dark-gray);
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--uber-green);
        }

        .close {
            color: var(--uber-white);
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: var(--uber-red);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--uber-green);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--uber-green);
            box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.2);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: rgba(0, 212, 170, 0.2);
            border: 1px solid var(--uber-green);
            color: var(--uber-green);
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--uber-red);
            color: var(--uber-red);
        }

        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .support-container {
                padding: 15px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .support-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-content {
                margin: 2% auto;
                width: 95%;
            }
            
            .ticket-header {
                flex-direction: column;
                gap: 10px;
            }
            
            .ticket-meta {
                flex-direction: column;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="support-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-headset"></i> الدعم الفني</h1>
            <a href="/driver" class="back-btn">
                <i class="fas fa-arrow-right"></i> العودة للوحة التحكم
            </a>
        </div>

        <!-- Alert Messages -->
        <div id="alert-success" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span id="success-message"></span>
        </div>
        
        <div id="alert-error" class="alert alert-error">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="error-message"></span>
        </div>

        <!-- Support Grid -->
        <div class="support-grid">
            <!-- Quick Actions -->
            <div class="support-card">
                <h2 class="card-title">
                    <i class="fas fa-bolt"></i> إجراءات سريعة
                </h2>
                
                <div class="quick-actions">
                    <div class="action-item" onclick="openTicketModal()">
                        <h3><i class="fas fa-plus-circle"></i> تذكرة جديدة</h3>
                        <p>إنشاء تذكرة دعم فني جديدة</p>
                    </div>
                    
                    <div class="action-item" onclick="callSupport()">
                        <h3><i class="fas fa-phone"></i> اتصال مباشر</h3>
                        <p>الاتصال بفريق الدعم الفني</p>
                    </div>
                    
                    <div class="action-item" onclick="openFAQ()">
                        <h3><i class="fas fa-question-circle"></i> الأسئلة الشائعة</h3>
                        <p>البحث في الأسئلة الشائعة</p>
                    </div>
                    
                    <div class="action-item" onclick="openGuide()">
                        <h3><i class="fas fa-book"></i> دليل المستخدم</h3>
                        <p>دليل استخدام التطبيق</p>
                    </div>
                </div>
            </div>

            <!-- Support Tickets -->
            <div class="support-card">
                <h2 class="card-title">
                    <i class="fas fa-ticket-alt"></i> تذاكر الدعم
                </h2>
                
                <div id="tickets-container">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p>جاري تحميل التذاكر...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New Ticket Modal -->
    <div id="ticket-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">إنشاء تذكرة دعم جديدة</h3>
                <span class="close" onclick="closeTicketModal()">&times;</span>
            </div>
            
            <form id="ticket-form">
                <div class="form-group">
                    <label for="ticket-category">الفئة *</label>
                    <select id="ticket-category" required>
                        <option value="">اختر الفئة</option>
                        <option value="technical">مشكلة تقنية</option>
                        <option value="vehicle">مشكلة في المركبة</option>
                        <option value="trip">مشكلة في الرحلة</option>
                        <option value="payment">مشكلة في الدفع</option>
                        <option value="account">مشكلة في الحساب</option>
                        <option value="other">أخرى</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="ticket-priority">الأولوية *</label>
                    <select id="ticket-priority" required>
                        <option value="">اختر الأولوية</option>
                        <option value="low">منخفضة</option>
                        <option value="medium">متوسطة</option>
                        <option value="high">عالية</option>
                        <option value="urgent">عاجلة</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="ticket-subject">الموضوع *</label>
                    <input type="text" id="ticket-subject" required placeholder="موضوع التذكرة">
                </div>
                
                <div class="form-group">
                    <label for="ticket-description">الوصف *</label>
                    <textarea id="ticket-description" required placeholder="وصف تفصيلي للمشكلة"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="ticket-attachment">مرفق (اختياري)</label>
                    <input type="file" id="ticket-attachment" accept="image/*,.pdf,.doc,.docx">
                </div>
            </form>
            
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeTicketModal()">
                    إلغاء
                </button>
                <button type="submit" form="ticket-form" class="btn btn-primary" id="create-ticket-btn">
                    <i class="fas fa-paper-plane"></i> إنشاء التذكرة
                </button>
            </div>
        </div>
    </div>

    <script src="/assets/frappe/js/frappe-web.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadTickets();
            
            // Ticket form submission
            document.getElementById('ticket-form').addEventListener('submit', handleTicketSubmission);
        });

        async function loadTickets() {
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.get_support_tickets');
                const data = await response.json();
                
                if (data.message && data.message.tickets) {
                    displayTickets(data.message.tickets);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading tickets:', error);
                showError('حدث خطأ في تحميل التذاكر');
            }
        }

        function displayTickets(tickets) {
            const container = document.getElementById('tickets-container');
            
            if (tickets.length === 0) {
                showEmptyState();
                return;
            }
            
            container.innerHTML = `
                <div class="tickets-list">
                    ${tickets.map(ticket => `
                        <div class="ticket-item">
                            <div class="ticket-header">
                                <div>
                                    <div class="ticket-title">${ticket.subject}</div>
                                    <div class="ticket-id">#${ticket.name}</div>
                                </div>
                                <span class="ticket-status status-${ticket.status.toLowerCase().replace(' ', '-')}">
                                    ${getStatusText(ticket.status)}
                                </span>
                            </div>
                            
                            <div class="ticket-meta">
                                <span><i class="fas fa-tag"></i> ${getCategoryText(ticket.category)}</span>
                                <span><i class="fas fa-flag"></i> ${getPriorityText(ticket.priority)}</span>
                                <span><i class="fas fa-calendar"></i> ${formatDate(ticket.creation)}</span>
                            </div>
                            
                            <div class="ticket-description">
                                ${ticket.description.length > 150 ? 
                                    ticket.description.substring(0, 150) + '...' : 
                                    ticket.description}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showEmptyState() {
            const container = document.getElementById('tickets-container');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-ticket-alt"></i>
                    <h3>لا توجد تذاكر دعم</h3>
                    <p>لم تقم بإنشاء أي تذاكر دعم بعد</p>
                </div>
            `;
        }

        function openTicketModal() {
            document.getElementById('ticket-modal').style.display = 'block';
        }

        function closeTicketModal() {
            document.getElementById('ticket-modal').style.display = 'none';
            document.getElementById('ticket-form').reset();
        }

        async function handleTicketSubmission(e) {
            e.preventDefault();
            
            const formData = new FormData();
            formData.append('category', document.getElementById('ticket-category').value);
            formData.append('priority', document.getElementById('ticket-priority').value);
            formData.append('subject', document.getElementById('ticket-subject').value);
            formData.append('description', document.getElementById('ticket-description').value);
            
            const attachment = document.getElementById('ticket-attachment').files[0];
            if (attachment) {
                formData.append('attachment', attachment);
            }
            
            const createBtn = document.getElementById('create-ticket-btn');
            const originalText = createBtn.innerHTML;
            
            // Disable button and show loading
            createBtn.disabled = true;
            createBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإنشاء...';
            
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.create_support_ticket', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    showSuccess('تم إنشاء التذكرة بنجاح');
                    closeTicketModal();
                    loadTickets(); // Reload tickets
                } else {
                    showError(data.message?.error || 'حدث خطأ في إنشاء التذكرة');
                }
            } catch (error) {
                console.error('Error creating ticket:', error);
                showError('حدث خطأ في إنشاء التذكرة');
            } finally {
                // Re-enable button
                createBtn.disabled = false;
                createBtn.innerHTML = originalText;
            }
        }

        function callSupport() {
            // Replace with actual support phone number
            window.location.href = 'tel:+966123456789';
        }

        function openFAQ() {
            // Open FAQ page or modal
            window.open('/driver/faq', '_blank');
        }

        function openGuide() {
            // Open user guide page or modal
            window.open('/driver/guide', '_blank');
        }

        function getStatusText(status) {
            const statusMap = {
                'Open': 'مفتوحة',
                'In Progress': 'قيد المعالجة',
                'Resolved': 'محلولة',
                'Closed': 'مغلقة'
            };
            return statusMap[status] || status;
        }

        function getCategoryText(category) {
            const categoryMap = {
                'technical': 'مشكلة تقنية',
                'vehicle': 'مشكلة في المركبة',
                'trip': 'مشكلة في الرحلة',
                'payment': 'مشكلة في الدفع',
                'account': 'مشكلة في الحساب',
                'other': 'أخرى'
            };
            return categoryMap[category] || category;
        }

        function getPriorityText(priority) {
            const priorityMap = {
                'low': 'منخفضة',
                'medium': 'متوسطة',
                'high': 'عالية',
                'urgent': 'عاجلة'
            };
            return priorityMap[priority] || priority;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA');
        }

        function showSuccess(message) {
            const alert = document.getElementById('alert-success');
            const messageSpan = document.getElementById('success-message');
            messageSpan.textContent = message;
            alert.style.display = 'block';
            
            // Hide error alert
            document.getElementById('alert-error').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function showError(message) {
            const alert = document.getElementById('alert-error');
            const messageSpan = document.getElementById('error-message');
            messageSpan.textContent = message;
            alert.style.display = 'block';
            
            // Hide success alert
            document.getElementById('alert-success').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('ticket-modal');
            if (event.target === modal) {
                closeTicketModal();
            }
        }
    </script>
</body>
</html>
