<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Management - Driver Dashboard</title>
    <link rel="stylesheet" href="/assets/frappe/css/frappe-web.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --uber-black: #000000;
            --uber-dark-gray: #1a1a1a;
            --uber-gray: #2d2d2d;
            --uber-light-gray: #4a4a4a;
            --uber-white: #ffffff;
            --uber-green: #00d4aa;
            --uber-blue: #276ef1;
            --uber-red: #e74c3c;
            --uber-yellow: #f1c40f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--uber-black) 0%, var(--uber-dark-gray) 100%);
            color: var(--uber-white);
            min-height: 100vh;
            direction: rtl;
        }

        .fuel-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            text-decoration: none;
        }

        .add-fuel-section {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--uber-green);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .fuel-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--uber-green);
        }

        .form-group input,
        .form-group select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--uber-green);
            box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.2);
        }

        .add-btn {
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            border: none;
            color: var(--uber-white);
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 170, 0.3);
        }

        .add-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .fuel-entries {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .entries-grid {
            display: grid;
            gap: 15px;
        }

        .fuel-entry {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .fuel-entry:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .entry-date {
            font-weight: 600;
            color: var(--uber-blue);
            font-size: 1.1rem;
        }

        .entry-amount {
            font-weight: 700;
            color: var(--uber-green);
            font-size: 1.2rem;
        }

        .entry-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-item i {
            color: var(--uber-green);
            width: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.7;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--uber-green);
        }

        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: rgba(0, 212, 170, 0.2);
            border: 1px solid var(--uber-green);
            color: var(--uber-green);
        }

        .alert-error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--uber-red);
            color: var(--uber-red);
        }

        @media (max-width: 768px) {
            .fuel-container {
                padding: 15px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .fuel-form {
                grid-template-columns: 1fr;
            }
            
            .entry-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="fuel-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-gas-pump"></i> إدارة الوقود</h1>
            <a href="/driver" class="back-btn">
                <i class="fas fa-arrow-right"></i> العودة للوحة التحكم
            </a>
        </div>

        <!-- Alert Messages -->
        <div id="alert-success" class="alert alert-success">
            <i class="fas fa-check-circle"></i>
            <span id="success-message"></span>
        </div>
        
        <div id="alert-error" class="alert alert-error">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="error-message"></span>
        </div>

        <!-- Add Fuel Entry -->
        <div class="add-fuel-section">
            <h2 class="section-title">
                <i class="fas fa-plus-circle"></i> إضافة إدخال وقود جديد
            </h2>
            
            <form id="fuel-form" class="fuel-form">
                <div class="form-group">
                    <label for="vehicle">المركبة *</label>
                    <select id="vehicle" required>
                        <option value="">اختر المركبة</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="fuel-date">تاريخ التزود بالوقود *</label>
                    <input type="date" id="fuel-date" required>
                </div>
                
                <div class="form-group">
                    <label for="quantity">الكمية (لتر) *</label>
                    <input type="number" id="quantity" step="0.01" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="amount">المبلغ (ريال) *</label>
                    <input type="number" id="amount" step="0.01" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="vendor">المحطة</label>
                    <input type="text" id="vendor" placeholder="اسم محطة الوقود">
                </div>
                
                <div class="form-group">
                    <label for="odometer">قراءة العداد</label>
                    <input type="number" id="odometer" min="0" placeholder="كيلومتر">
                </div>
            </form>
            
            <button type="submit" form="fuel-form" class="add-btn" id="submit-btn">
                <i class="fas fa-plus"></i> إضافة إدخال الوقود
            </button>
        </div>

        <!-- Fuel Entries -->
        <div class="fuel-entries">
            <h2 class="section-title">
                <i class="fas fa-history"></i> سجل الوقود
            </h2>
            
            <div class="entries-grid" id="entries-container">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>جاري تحميل سجل الوقود...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/frappe/js/frappe-web.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadVehicles();
            loadFuelEntries();
            
            // Set today's date as default
            document.getElementById('fuel-date').value = new Date().toISOString().split('T')[0];
            
            // Form submission
            document.getElementById('fuel-form').addEventListener('submit', handleFormSubmit);
        });

        async function loadVehicles() {
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.get_assigned_vehicles');
                const data = await response.json();
                
                if (data.message && data.message.vehicles) {
                    const vehicleSelect = document.getElementById('vehicle');
                    vehicleSelect.innerHTML = '<option value="">اختر المركبة</option>';
                    
                    data.message.vehicles.forEach(vehicle => {
                        const option = document.createElement('option');
                        option.value = vehicle.name;
                        option.textContent = `${vehicle.license_plate} - ${vehicle.make} ${vehicle.model}`;
                        vehicleSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading vehicles:', error);
                showError('حدث خطأ في تحميل المركبات');
            }
        }

        async function loadFuelEntries() {
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.get_fuel_entries');
                const data = await response.json();
                
                if (data.message && data.message.entries) {
                    displayFuelEntries(data.message.entries);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('Error loading fuel entries:', error);
                showError('حدث خطأ في تحميل سجل الوقود');
            }
        }

        function displayFuelEntries(entries) {
            const container = document.getElementById('entries-container');
            
            if (entries.length === 0) {
                showEmptyState();
                return;
            }

            container.innerHTML = entries.map(entry => `
                <div class="fuel-entry">
                    <div class="entry-header">
                        <span class="entry-date">${formatDate(entry.fuel_date)}</span>
                        <span class="entry-amount">${entry.amount} ريال</span>
                    </div>
                    
                    <div class="entry-details">
                        <div class="detail-item">
                            <i class="fas fa-car"></i>
                            <span>${entry.vehicle}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-tint"></i>
                            <span>${entry.quantity} لتر</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-calculator"></i>
                            <span>${(entry.amount / entry.quantity).toFixed(2)} ريال/لتر</span>
                        </div>
                        ${entry.vendor ? `
                        <div class="detail-item">
                            <i class="fas fa-gas-pump"></i>
                            <span>${entry.vendor}</span>
                        </div>
                        ` : ''}
                        ${entry.odometer_reading ? `
                        <div class="detail-item">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>${entry.odometer_reading} كم</span>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function showEmptyState() {
            const container = document.getElementById('entries-container');
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-gas-pump"></i>
                    <h3>لا توجد إدخالات وقود</h3>
                    <p>لم يتم تسجيل أي إدخالات وقود بعد</p>
                </div>
            `;
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            const originalText = submitBtn.innerHTML;
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإضافة...';
            
            try {
                const formData = {
                    vehicle: document.getElementById('vehicle').value,
                    fuel_date: document.getElementById('fuel-date').value,
                    quantity: parseFloat(document.getElementById('quantity').value),
                    amount: parseFloat(document.getElementById('amount').value),
                    vendor: document.getElementById('vendor').value,
                    odometer_reading: document.getElementById('odometer').value ? parseInt(document.getElementById('odometer').value) : null
                };
                
                const response = await fetch('/api/method/fleet_management.api.driver.create_fuel_entry', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    showSuccess('تم إضافة إدخال الوقود بنجاح');
                    document.getElementById('fuel-form').reset();
                    document.getElementById('fuel-date').value = new Date().toISOString().split('T')[0];
                    loadFuelEntries();
                } else {
                    showError(data.message?.error || 'حدث خطأ في إضافة إدخال الوقود');
                }
            } catch (error) {
                console.error('Error adding fuel entry:', error);
                showError('حدث خطأ في إضافة إدخال الوقود');
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }

        function formatDate(dateString) {
            if (!dateString) return '--';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA');
        }

        function showSuccess(message) {
            const alert = document.getElementById('alert-success');
            const messageSpan = document.getElementById('success-message');
            messageSpan.textContent = message;
            alert.style.display = 'block';
            
            // Hide error alert
            document.getElementById('alert-error').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        function showError(message) {
            const alert = document.getElementById('alert-error');
            const messageSpan = document.getElementById('error-message');
            messageSpan.textContent = message;
            alert.style.display = 'block';
            
            // Hide success alert
            document.getElementById('alert-success').style.display = 'none';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
