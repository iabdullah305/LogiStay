<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - Driver Dashboard</title>
    <link rel="stylesheet" href="/assets/frappe/css/frappe-web.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --uber-black: #000000;
            --uber-dark-gray: #1a1a1a;
            --uber-gray: #2d2d2d;
            --uber-light-gray: #4a4a4a;
            --uber-white: #ffffff;
            --uber-green: #00d4aa;
            --uber-blue: #276ef1;
            --uber-red: #e74c3c;
            --uber-yellow: #f1c40f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--uber-black) 0%, var(--uber-dark-gray) 100%);
            color: var(--uber-white);
            min-height: 100vh;
            direction: rtl;
        }

        .trips-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 20px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            text-decoration: none;
        }

        .filters {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--uber-green);
        }

        .filter-group select,
        .filter-group input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--uber-white);
            padding: 12px 15px;
            border-radius: 12px;
            font-size: 14px;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--uber-green);
            box-shadow: 0 0 0 2px rgba(0, 212, 170, 0.2);
        }

        .filter-btn {
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            border: none;
            color: var(--uber-white);
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 170, 0.3);
        }

        .trips-grid {
            display: grid;
            gap: 20px;
        }

        .trip-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .trip-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--uber-green), var(--uber-blue));
        }

        .trip-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 212, 170, 0.2);
        }

        .trip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .trip-id {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--uber-blue);
        }

        .trip-status {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-assigned {
            background: var(--uber-yellow);
            color: var(--uber-black);
        }

        .status-in-progress {
            background: var(--uber-green);
            color: var(--uber-black);
        }

        .status-completed {
            background: var(--uber-blue);
            color: var(--uber-white);
        }

        .status-cancelled {
            background: var(--uber-red);
            color: var(--uber-white);
        }

        .trip-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-item i {
            color: var(--uber-green);
            width: 20px;
        }

        .trip-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--uber-green), var(--uber-blue));
            color: var(--uber-white);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--uber-white);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: var(--uber-red);
            color: var(--uber-white);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            color: var(--uber-white);
            text-decoration: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.7;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--uber-green);
        }

        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .trips-container {
                padding: 15px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .filter-row {
                grid-template-columns: 1fr;
            }
            
            .trip-details {
                grid-template-columns: 1fr;
            }
            
            .trip-actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="trips-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-route"></i> {{ __("My Trips") }}</h1>
        <a href="/driver" class="back-btn">
            <i class="fas fa-arrow-right"></i> {{ __("Back to Dashboard") }}
        </a>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label>حالة الرحلة</label>
                    <select id="status-filter">
                        <option value="">جميع الحالات</option>
                        <option value="Assigned">مُعيَّنة</option>
                        <option value="In Progress">قيد التنفيذ</option>
                        <option value="Completed">مكتملة</option>
                        <option value="Cancelled">ملغية</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>من تاريخ</label>
                    <input type="date" id="from-date">
                </div>
                
                <div class="filter-group">
                    <label>إلى تاريخ</label>
                    <input type="date" id="to-date">
                </div>
                
                <div class="filter-group">
                    <button class="filter-btn" onclick="applyFilters()">
                        <i class="fas fa-search"></i> بحث
                    </button>
                </div>
            </div>
        </div>

        <!-- Trips Grid -->
        <div class="trips-grid" id="trips-container">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>جاري تحميل الرحلات...</p>
            </div>
        </div>
    </div>

    <script src="/assets/frappe/js/frappe-web.min.js"></script>
    <script>
        let allTrips = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            loadTrips();
        });

        async function loadTrips() {
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.get_driver_trips');
                const data = await response.json();
                
                if (data.message) {
                    allTrips = data.message;
                    displayTrips(allTrips);
                }
            } catch (error) {
                console.error('Error loading trips:', error);
                showError('حدث خطأ في تحميل الرحلات');
            }
        }

        function displayTrips(trips) {
            const container = document.getElementById('trips-container');
            
            if (trips.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-route"></i>
                        <h3>لا توجد رحلات</h3>
                        <p>لم يتم العثور على رحلات تطابق المعايير المحددة</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = trips.map(trip => `
                <div class="trip-card">
                    <div class="trip-header">
                        <span class="trip-id">#${trip.name}</span>
                        <span class="trip-status status-${trip.status.toLowerCase().replace(' ', '-')}">
                            ${getStatusText(trip.status)}
                        </span>
                    </div>
                    
                    <div class="trip-details">
                        <div class="detail-item">
                            <i class="fas fa-car"></i>
                            <span>المركبة: ${trip.vehicle}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-calendar"></i>
                            <span>التاريخ: ${formatDate(trip.date)}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-clock"></i>
                            <span>وقت البداية: ${trip.start_time || '--'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-clock"></i>
                            <span>وقت النهاية: ${trip.end_time || '--'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>الوجهة: ${trip.destination || '--'}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-user"></i>
                            <span>العميل: ${trip.customer || '--'}</span>
                        </div>
                    </div>
                    
                    <div class="trip-actions">
                        ${getTripActions(trip)}
                    </div>
                </div>
            `).join('');
        }

        function getTripActions(trip) {
            let actions = [];
            
            if (trip.status === 'Assigned') {
                actions.push(`
                    <button class="action-btn btn-primary" onclick="acceptTrip('${trip.name}')">
                        <i class="fas fa-check"></i> قبول الرحلة
                    </button>
                `);
            }
            
            if (trip.status === 'In Progress') {
                actions.push(`
                    <button class="action-btn btn-primary" onclick="completeTrip('${trip.name}')">
                        <i class="fas fa-flag-checkered"></i> إنهاء الرحلة
                    </button>
                `);
            }
            
            actions.push(`
                <button class="action-btn btn-secondary" onclick="viewTripDetails('${trip.name}')">
                    <i class="fas fa-eye"></i> التفاصيل
                </button>
            `);
            
            if (trip.status === 'Assigned') {
                actions.push(`
                    <button class="action-btn btn-danger" onclick="rejectTrip('${trip.name}')">
                        <i class="fas fa-times"></i> رفض
                    </button>
                `);
            }
            
            return actions.join('');
        }

        function applyFilters() {
            const statusFilter = document.getElementById('status-filter').value;
            const fromDate = document.getElementById('from-date').value;
            const toDate = document.getElementById('to-date').value;
            
            let filteredTrips = allTrips;
            
            if (statusFilter) {
                filteredTrips = filteredTrips.filter(trip => trip.status === statusFilter);
            }
            
            if (fromDate) {
                filteredTrips = filteredTrips.filter(trip => trip.date >= fromDate);
            }
            
            if (toDate) {
                filteredTrips = filteredTrips.filter(trip => trip.date <= toDate);
            }
            
            displayTrips(filteredTrips);
        }

        async function acceptTrip(tripId) {
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.accept_trip', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ trip_id: tripId })
                });
                
                const data = await response.json();
                
                if (data.message.success) {
                    showSuccess('تم قبول الرحلة بنجاح');
                    loadTrips();
                } else {
                    showError(data.message.error || 'حدث خطأ في قبول الرحلة');
                }
            } catch (error) {
                console.error('Error accepting trip:', error);
                showError('حدث خطأ في قبول الرحلة');
            }
        }

        async function completeTrip(tripId) {
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.complete_trip', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ trip_id: tripId })
                });
                
                const data = await response.json();
                
                if (data.message.success) {
                    showSuccess('تم إنهاء الرحلة بنجاح');
                    loadTrips();
                } else {
                    showError(data.message.error || 'حدث خطأ في إنهاء الرحلة');
                }
            } catch (error) {
                console.error('Error completing trip:', error);
                showError('حدث خطأ في إنهاء الرحلة');
            }
        }

        async function rejectTrip(tripId) {
            if (!confirm('هل أنت متأكد من رفض هذه الرحلة؟')) {
                return;
            }
            
            try {
                const response = await fetch('/api/method/fleet_management.api.driver.reject_trip', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ trip_id: tripId })
                });
                
                const data = await response.json();
                
                if (data.message.success) {
                    showSuccess('تم رفض الرحلة');
                    loadTrips();
                } else {
                    showError(data.message.error || 'حدث خطأ في رفض الرحلة');
                }
            } catch (error) {
                console.error('Error rejecting trip:', error);
                showError('حدث خطأ في رفض الرحلة');
            }
        }

        function viewTripDetails(tripId) {
            // Redirect to trip details page
            window.location.href = `/driver/trip-details?id=${tripId}`;
        }

        function getStatusText(status) {
            const statusMap = {
                'Assigned': 'مُعيَّنة',
                'In Progress': 'قيد التنفيذ',
                'Completed': 'مكتملة',
                'Cancelled': 'ملغية'
            };
            return statusMap[status] || status;
        }

        function formatDate(dateString) {
            if (!dateString) return '--';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA');
        }

        function showError(message) {
            // Simple alert for now, can be enhanced with better UI
            alert(message);
        }

        function showSuccess(message) {
            // Simple alert for now, can be enhanced with better UI
            alert(message);
        }
    </script>
</body>
</html>
