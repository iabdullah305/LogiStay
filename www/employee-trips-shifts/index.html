{% extends "templates/web.html" %}

{% block title %}Employee Trips and Shifts - LogiStay{% endblock %}

{% block head_include %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lookup employee trips and shifts information">
{% endblock %}

{% block content %}
    <div id="employee-trips-app">
        <!-- Vue app will mount here -->
        <div class="loading-container text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="sr-only">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading Employee Trips and Shifts...</p>
        </div>
    </div>
{% endblock %}

{% block script %}
    <script type="module" src="/assets/logistay/dist/employee-trips.js"></script>
{% endblock %}
