{% extends "templates/web.html" %}

{% block title %}Supervisor Tasks - LogiStay{% endblock %}

{% block head_include %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Supervisor daily tasks management">
{% endblock %}

{% block content %}
    <div id="supervisor-tasks-app">
        <!-- Vue app will mount here -->
        <div class="loading-container text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="sr-only">Loading...</span>
            </div>
            <p class="mt-3 text-muted">Loading Supervisor Tasks...</p>
        </div>
    </div>
    
    <!-- Console Testing -->
    <script>
        console.log('Supervisor Tasks page loaded successfully');
        console.log('Page URL:', window.location.href);
        console.log('Frappe available:', typeof window.frappe !== 'undefined');
    </script>
{% endblock %}

{% block script %}
    <script type="module" src="/assets/logistay/dist/supervisor-tasks.js"></script>
{% endblock %}
